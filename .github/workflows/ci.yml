# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    # Use ["main", "master"] for CI only on the default branch.
    # Use ["**"] for CI on all branches.
    branches: ["**"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        # Update this as needed:
        # Common platforms: ["ubuntu-latest", "macos-latest", "windows-latest"]
        os: ["ubuntu-latest", "windows-latest"]
        python-version: ["3.11", "3.14"]

    # Run CI tests on Windows and Linux.
    runs-on: ${{ matrix.os }}

    defaults:
      run:
        # bash is available on all GitHub-hosted runners (Git Bash on Windows)
        # and gives us consistent behaviour for tee, path separators, etc.
        shell: bash

    steps:
      # Generally following uv docs:
      # https://docs.astral.sh/uv/guides/integration/github/

      - name: Checkout (official GitHub action)
        uses: actions/checkout@v6
        with:
          # Important for versioning plugins:
          fetch-depth: 0

      - name: Install uv (official Astral action)
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          # Update this as needed:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Set up Python (using uv)
        run: uv python install

      - name: Install all dependencies
        run: uv sync --all-extras

      - name: Run linting
        run: uv run python devtools/lint.py

      - name: Run tests
        run: uv run pytest

      - name: Run performance check
        run: |
          set -o pipefail
          uv run devtools/performance-check.py \
            2>&1 | tee perf-output-${{ matrix.os }}.txt

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          # artifact names must be unique across the matrix, so include the OS
          name: perf-output-${{ matrix.os }}
          path: perf-output-${{ matrix.os }}.txt
          retention-days: 7
